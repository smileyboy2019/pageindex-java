# 模型配置
model: "gpt-4o-2024-11-20"
# 模型接口类型: openai, ollama, deepspeed, custom
model_provider: "openai"

# OpenAI 配置
openai:
  api_key: ""  # 从环境变量 CHATGPT_API_KEY 读取，或在此配置
  base_url: ""  # 可选，自定义 API 地址
  temperature: 0

# Ollama 配置
ollama:
  base_url: "http://localhost:11434"  # Ollama 服务地址
  model: "llama2"  # 使用的模型名称
  temperature: 0
  timeout: 60  # 请求超时时间（秒）

# DeepSpeed 配置
deepspeed:
  base_url: "http://localhost:8000"  # DeepSpeed 服务地址
  model: ""  # 模型名称
  temperature: 0
  timeout: 120
  headers: {}  # 自定义请求头

# 自定义接口配置
custom:
  base_url: ""  # 自定义 API 地址
  model: ""  # 模型名称
  api_key: ""  # API 密钥（如果需要）
  headers: {}  # 自定义请求头
  temperature: 0
  timeout: 60

# 其他配置
toc_check_page_num: 20
max_page_num_each_node: 10
max_token_num_each_node: 20000
if_add_node_id: "yes"
if_add_node_summary: "yes"
summary_method: "llm"  # 摘要生成方式: "llm" 使用LLM生成, "hanlp" 使用HanLP生成
if_add_doc_description: "no"
if_add_node_text: "no"
